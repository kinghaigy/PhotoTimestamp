<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#2d6bbf"/>

  <!-- Camera body -->
  <rect x="22" y="44" width="84" height="54" rx="8" ry="8" fill="#f0f4ff"/>

  <!-- Camera top notch (shutter bump) -->
  <rect x="44" y="36" width="28" height="14" rx="5" ry="5" fill="#f0f4ff"/>

  <!-- Lens ring -->
  <circle cx="64" cy="71" r="20" fill="#2d6bbf"/>
  <circle cx="64" cy="71" r="15" fill="#1a3f80"/>
  <circle cx="64" cy="71" r="10" fill="#0d2248"/>

  <!-- Lens shine -->
  <circle cx="58" cy="65" r="4" fill="rgba(255,255,255,0.25)"/>

  <!-- Flash slot -->
  <rect x="28" y="52" width="14" height="7" rx="3" ry="3" fill="#c8d8f8"/>

  <!-- Date stamp ribbon (bottom right of camera) -->
  <rect x="68" y="76" width="36" height="22" rx="4" ry="4" fill="#f5c842" stroke="#c9991e" stroke-width="1.5"/>

  <!-- Stamp lines representing text -->
  <line x1="73" y1="83" x2="99" y2="83" stroke="#7a5d00" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="73" y1="89" x2="92" y2="89" stroke="#7a5d00" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="73" y1="95" x2="95" y2="95" stroke="#7a5d00" stroke-width="2.2" stroke-linecap="round"/>
</svg>
